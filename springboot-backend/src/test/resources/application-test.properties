spring.datasource.url=jdbc:h2:mem:campusfind;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.upload.dir=${java.io.tmpdir}/campusfind-test-uploads
app.jwt.secret=campusfind-test-secret-that-is-long-enough-for-hmac-signing
app.jwt.expiration-ms=3600000
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.admin.email=
app.admin.password=
