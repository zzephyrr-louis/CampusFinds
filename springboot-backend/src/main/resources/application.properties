spring.application.name=springboot-backend
server.port=8080

# --- MySQL connection ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campusfind?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# --- File uploads ---
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- JWT ---
app.jwt.secret=${JWT_SECRET:campusfind-development-secret-change-before-production-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- CORS ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Optional first administrator. Leave ADMIN_EMAIL blank to disable bootstrap.
app.admin.student-id=${ADMIN_STUDENT_ID:ADMIN-0001}
app.admin.fullname=${ADMIN_FULLNAME:CampusFind Administrator}
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
