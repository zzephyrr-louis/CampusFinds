spring.application.name=springboot-backend
server.port=8080

# --- MySQL connection ---
spring.datasource.url=jdbc:mysql://localhost:3306/campusfind?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- File uploads ---
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- JWT ---
app.jwt.secret=replace-this-with-a-long-random-secret-at-least-32-characters
app.jwt.expiration-ms=86400000

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173